name: LinkedIn Post Automation

on:
  schedule:
    # Run everyday at 4:30 AM UTC (10:00 AM IST)
    - cron: '30 4 * * *'
  workflow_dispatch:
    # Allows manual trigger of the action from the GitHub UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create credentials directory
        run: mkdir -p credentials

      - name: Generate google-credentials.json
        run: |
          cat << 'EOF' > credentials/google-credentials.json
          ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF

      - name: Generate config.py
        run: |
          cat << 'EOF' > config.py
          GROQ_API_KEY = "${{ secrets.GROQ_API_KEY }}"
          POLLINATIONS_API_KEY = "${{ secrets.POLLINATIONS_API_KEY }}"
          LINKEDIN_ACCESS_TOKEN = "${{ secrets.LINKEDIN_ACCESS_TOKEN }}"
          LINKEDIN_PERSON_URN = "${{ secrets.LINKEDIN_PERSON_URN }}"
          GOOGLE_SHEET_ID = "${{ secrets.GOOGLE_SHEET_ID }}"
          GOOGLE_CREDENTIALS_FILE = "credentials/google-credentials.json"
          SHEET_NAME = "Posts"
          GMAIL_SENDER = "${{ secrets.GMAIL_SENDER }}"
          GMAIL_RECEIVER = "${{ secrets.GMAIL_RECEIVER }}"
          GMAIL_APP_PASSWORD = "${{ secrets.GMAIL_APP_PASSWORD }}"
          POST_TIME = "10:00"
          MAX_RETRIES = 3
          QUALITY_MIN_SCORE = 6

          def _validate():
              critical = {
                  "GROQ_API_KEY": GROQ_API_KEY,
                  "POLLINATIONS_API_KEY": POLLINATIONS_API_KEY,
                  "LINKEDIN_ACCESS_TOKEN": LINKEDIN_ACCESS_TOKEN,
                  "LINKEDIN_PERSON_URN": LINKEDIN_PERSON_URN,
                  "GOOGLE_SHEET_ID": GOOGLE_SHEET_ID,
                  "GMAIL_SENDER": GMAIL_SENDER,
                  "GMAIL_RECEIVER": GMAIL_RECEIVER,
                  "GMAIL_APP_PASSWORD": GMAIL_APP_PASSWORD,
              }
              missing = [k for k, v in critical.items() if not v]
              if missing:
                  raise ValueError(
                      "Missing required environment secrets:\n" + 
                      "\n".join(f"  • {k}" for k in missing)
                  )
          _validate()
          EOF

      - name: Run LinkedIn Automation
        env:
          RUN_NOW: "true"
        run: python main.py
